{% extends 'base.html' %} {% block title %}Contact - My Flask Site{% endblock %}
{% block content %}
<div class="container py-5">
  <h1 class="text-center mb-5">Contact Us</h1>

  <div class="row">
    <!-- Map Column -->
    <div class="col-lg-6 mb-4">
      <div class="map-container">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3312.5461648454384!2d151.20698831521023!3d-33.8688197806656!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6b12ae401e8b983f%3A0x5017d681632ccc0!2sSydney%20NSW%2C%20Australia!5e0!3m2!1sen!2sus!4v1625234567890"
          width="100%"
          height="400"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
        >
        </iframe>
      </div>

      <!-- Contact Info (moved below map) -->
      <div class="contact-info mt-4">
        <h4>Other Ways to Reach Us</h4>
        <ul class="list-unstyled mb-0">
          <li class="mb-2">
            <strong>📍</strong> 123 Main Street, Sydney, NSW 2000
          </li>
          <li class="mb-2"><strong>📞</strong> (02) 1234 5678</li>
          <li>
            <strong>✉️</strong>
            <a href="mailto:info@myflasksite.com">info@myflasksite.com</a>
          </li>
        </ul>
      </div>
    </div>

    <!-- Form Column -->
    <div class="col-lg-6 mb-4">
      <div class="contact-form">
        <h4 class="mb-4">Send us a Message</h4>

        <form action="#" method="POST">
          <!-- Name Field -->
          <div class="mb-3">
            <label for="name" class="form-label">Your Name *</label>
            <input
              type="text"
              class="form-control"
              id="name"
              name="name"
              placeholder="John Smith"
              required
            />
          </div>

          <!-- Email Field -->
          <div class="mb-3">
            <label for="email" class="form-label">Email Address *</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="john@example.com"
              required
            />
          </div>

          <!-- Subject Field -->
          <div class="mb-3">
            <label for="subject" class="form-label">Subject</label>
            <select class="form-select" id="subject" name="subject">
              <option value="" selected>Choose a topic...</option>
              <option value="general">General Inquiry</option>
              <option value="support">Support</option>
              <option value="feedback">Feedback</option>
              <option value="other">Other</option>
            </select>
          </div>

          <!-- Message Field -->
          <div class="mb-3">
            <label for="message" class="form-label">Message *</label>
            <textarea
              class="form-control"
              id="message"
              name="message"
              rows="5"
              placeholder="How can we help you?"
              required
            ></textarea>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary btn-lg w-100">
            Send Message
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %} {% block extra_js %}
<script>
  const form = document.querySelector(".contact-form form");
  const alert = document.getElementById("successAlert");

  form.addEventListener("submit", function (e) {
    e.preventDefault(); // Stop actual submission

    // Show success message
    alert.classList.remove("d-none");
    alert.scrollIntoView({ behavior: "smooth" });

    // Reset form
    form.reset();
  });
</script>
{% endblock %}
